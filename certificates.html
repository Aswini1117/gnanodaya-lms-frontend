<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificates — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Certificates</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar">A</div>
        <span id="nav-name">Admin</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Certificates</div>
          <div class="page-subtitle">Issue and manage completion certificates</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openIssueModal()">+ Issue Certificate</button>
        </div>
      </div>

      <div class="panel" style="margin-bottom:20px">
        <div class="panel-body" style="display:flex;gap:12px;flex-wrap:wrap">
          <input type="text" class="form-input" id="search-input" placeholder="🔍 Search..." style="max-width:300px" oninput="filterCerts()"/>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Issued Certificates</span>
          <span class="badge badge-primary" id="cert-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Student</th>
                <th>Course</th>
                <th>Issued On</th>
                <th>Certificate ID</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="certs-table">
              <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Issue Modal -->
<div class="modal-overlay" id="cert-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Issue Certificate</div>
    <div class="form-group">
      <label class="form-label">Student ID <span style="color:var(--error)">*</span></label>
      <input type="text" class="form-input" id="cert-student" placeholder="Student ID"/>
    </div>
    <div class="form-group">
      <label class="form-label">Course ID <span style="color:var(--error)">*</span></label>
      <input type="text" class="form-input" id="cert-course" placeholder="Course ID"/>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="issueCertificate()">Issue Certificate</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/admin/certificates.js"></script>
</body>
</html>
