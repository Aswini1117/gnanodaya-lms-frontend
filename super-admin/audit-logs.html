<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audit Logs — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Audit Logs</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar" style="background:var(--super-admin)">S</div>
        <span id="nav-name">Super Admin</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Audit Logs</div>
          <div class="page-subtitle">Track all admin actions across the platform</div>
        </div>
        <div class="page-actions">
          <button class="btn" onclick="exportLogs()">📥 Export</button>
        </div>
      </div>

      <div class="panel" style="margin-bottom:20px">
        <div class="panel-body" style="display:flex;gap:12px;flex-wrap:wrap">
          <input type="text" class="form-input" id="search-input"
            placeholder="🔍 Search logs..."
            style="max-width:280px" oninput="filterLogs()"/>
          <select class="form-select" id="type-filter" style="max-width:180px" onchange="filterLogs()">
            <option value="">All Types</option>
            <option value="CREATE">Create</option>
            <option value="UPDATE">Update</option>
            <option value="DELETE">Delete</option>
            <option value="LOGIN">Login</option>
            <option value="CONFIG">Config</option>
          </select>
          <input type="date" class="form-input" id="date-from" style="max-width:160px" onchange="filterLogs()"/>
          <input type="date" class="form-input" id="date-to"   style="max-width:160px" onchange="filterLogs()"/>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Logs</span>
          <span class="badge badge-primary" id="log-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Action</th>
                <th>Performed By</th>
                <th>Institute</th>
                <th>Type</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="logs-table">
              <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/super-admin/audit-logs.js"></script>
</body>
</html>
