<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fee Management — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Fee Management</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar">A</div>
        <span id="nav-name">Admin</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">

      <div class="page-header">
        <div>
          <div class="page-title">Fee Management</div>
          <div class="page-subtitle">Track payments, dues and receipts</div>
        </div>
        <div class="page-actions">
          <button class="btn" onclick="exportFees()">📥 Export</button>
          <button class="btn btn-primary" onclick="openAddModal()">+ Add Payment</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card green">
          <div class="stat-icon">💰</div>
          <div class="stat-label">Total Collected</div>
          <div class="stat-value" id="stat-collected">—</div>
          <div class="stat-trend">This month</div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon">⏳</div>
          <div class="stat-label">Pending Dues</div>
          <div class="stat-value" id="stat-pending">—</div>
          <div class="stat-trend">Unpaid fees</div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-icon">👥</div>
          <div class="stat-label">Total Students</div>
          <div class="stat-value" id="stat-students">—</div>
          <div class="stat-trend">With fee records</div>
        </div>
      </div>

      <!-- Filter -->
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-body" style="display:flex;gap:12px;flex-wrap:wrap">
          <input type="text" class="form-input" id="search-input" placeholder="🔍 Search student..." style="max-width:300px" oninput="filterFees()"/>
          <select class="form-select" id="status-filter" style="max-width:180px" onchange="filterFees()">
            <option value="">All Status</option>
            <option value="PAID">Paid</option>
            <option value="PENDING">Pending</option>
            <option value="OVERDUE">Overdue</option>
          </select>
        </div>
      </div>

      <!-- Table -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">Fee Records</span>
          <span class="badge badge-primary" id="fee-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Student</th>
                <th>Course</th>
                <th>Amount</th>
                <th>Due Date</th>
                <th>Paid On</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="fee-table">
              <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="fee-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Add Payment</div>
    <input type="hidden" id="fee-id"/>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Student ID <span style="color:var(--error)">*</span></label>
        <input type="text" class="form-input" id="fee-student" placeholder="Student ID"/>
      </div>
      <div class="form-group">
        <label class="form-label">Course ID <span style="color:var(--error)">*</span></label>
        <input type="text" class="form-input" id="fee-course" placeholder="Course ID"/>
      </div>
      <div class="form-group">
        <label class="form-label">Amount <span style="color:var(--error)">*</span></label>
        <input type="number" class="form-input" id="fee-amount" placeholder="Amount"/>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input type="date" class="form-input" id="fee-due"/>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="fee-status">
          <option value="PENDING">Pending</option>
          <option value="PAID">Paid</option>
          <option value="OVERDUE">Overdue</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveFee()">Save</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/admin/fee-management.js"></script>
</body>
</html>
