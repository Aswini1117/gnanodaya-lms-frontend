<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exam Schedule — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Exam Schedule</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar">A</div>
        <span id="nav-name">Admin</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Exam Schedule</div>
          <div class="page-subtitle">Create and manage exam timetables</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openAddModal()">+ Schedule Exam</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Exams</span>
          <span class="badge badge-primary" id="exam-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Exam Title</th>
                <th>Course</th>
                <th>Date</th>
                <th>Time</th>
                <th>Duration</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="exams-table">
              <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="exam-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Schedule Exam</div>
    <input type="hidden" id="exam-id"/>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Exam Title <span style="color:var(--error)">*</span></label>
        <input type="text" class="form-input" id="exam-title" placeholder="Exam title"/>
      </div>
      <div class="form-group">
        <label class="form-label">Course ID <span style="color:var(--error)">*</span></label>
        <input type="text" class="form-input" id="exam-course" placeholder="Course ID"/>
      </div>
      <div class="form-group">
        <label class="form-label">Date <span style="color:var(--error)">*</span></label>
        <input type="date" class="form-input" id="exam-date"/>
      </div>
      <div class="form-group">
        <label class="form-label">Time</label>
        <input type="time" class="form-input" id="exam-time"/>
      </div>
      <div class="form-group">
        <label class="form-label">Duration (mins)</label>
        <input type="number" class="form-input" id="exam-duration" placeholder="e.g. 120"/>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="exam-status">
          <option value="SCHEDULED">Scheduled</option>
          <option value="COMPLETED">Completed</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExam()">Save Exam</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/admin/exam-schedule.js"></script>
</body>
</html>
