<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Students — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">

  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Students</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar">A</div>
        <span id="nav-name">Admin</span>
      </div>
    </div>
  </header>

  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <main class="app-main">
    <div class="main-content">

      <div class="page-header">
        <div>
          <div class="page-title">Students</div>
          <div class="page-subtitle">Manage student access and registrations</div>
        </div>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:24px">
        <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
          ⏳ Pending Approval
          <span class="badge badge-warning" id="pending-count" style="margin-left:8px">0</span>
        </button>
        <button class="tab-btn" id="tab-active" onclick="switchTab('active')">
          ✅ Active Students
          <span class="badge badge-primary" id="active-count" style="margin-left:8px">0</span>
        </button>
      </div>

      <!-- Pending Students Panel -->
      <div id="panel-pending">
        <div class="panel">
          <div class="panel-head">
            <span class="panel-title">Pending Registrations</span>
            <span style="font-size:13px;color:var(--text-muted)">Approve students so they can log in</span>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Registered On</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="pending-table">
                <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Active Students Panel -->
      <div id="panel-active" style="display:none">
        <div class="panel" style="margin-bottom:20px">
          <div class="panel-body" style="display:flex;gap:12px;flex-wrap:wrap">
            <input type="text" class="form-input" id="search-input"
              placeholder="🔍 Search by name or phone..."
              style="max-width:300px" oninput="filterActive()"/>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <span class="panel-title">Active Students</span>
            <span class="badge badge-primary" id="active-count-table">0</span>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th>Joined On</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="active-table">
                <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<style>
.tab-btn {
  padding: 10px 24px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  margin-bottom: -2px;
  transition: all 0.2s;
  font-family: inherit;
}
.tab-btn.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
.tab-btn:hover:not(.active) {
  color: var(--text-primary);
}
</style>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/admin/students.js"></script>
</body>
</html>
