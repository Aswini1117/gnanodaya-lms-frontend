<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Batches — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">

  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Batches</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar">A</div>
        <span id="nav-name">Admin</span>
      </div>
    </div>
  </header>

  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <main class="app-main">
    <div class="main-content">

      <div class="page-header">
        <div>
          <div class="page-title">Batches</div>
          <div class="page-subtitle">Create and manage batches for your institute</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openModal()">+ Create Batch</button>
        </div>
      </div>

      <!-- Search -->
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-body" style="display:flex;gap:12px;flex-wrap:wrap">
          <input type="text" class="form-input" id="search-input"
            placeholder="🔍 Search batches..."
            style="max-width:300px" oninput="filterBatches()"/>
          <select class="form-select" id="status-filter" style="max-width:180px" onchange="filterBatches()">
            <option value="">All Status</option>
            <option value="UPCOMING">Upcoming</option>
            <option value="ONGOING">Ongoing</option>
            <option value="COMPLETED">Completed</option>
            <option value="CANCELLED">Cancelled</option>
          </select>
        </div>
      </div>

      <!-- Table -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Batches</span>
          <span class="badge badge-primary" id="batch-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Batch Name</th>
                <th>Instructor</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Days / Time</th>
                <th>Max Students</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="batches-table">
              <tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Create/Edit Batch Modal -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal" style="max-width:620px">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Create Batch</div>
    <input type="hidden" id="batch-id"/>

    <div class="form-row">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Batch Name <span style="color:var(--error)">*</span></label>
        <input type="text" class="form-input" id="batch-name" placeholder="e.g. VLSI Batch June 2026"/>
      </div>
      <div class="form-group">
        <label class="form-label">Course <span style="color:var(--error)">*</span></label>
        <select class="form-select" id="batch-course">
          <option value="">Select course</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Instructor <span style="color:var(--error)">*</span></label>
        <select class="form-select" id="batch-instructor">
          <option value="">Select instructor</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Start Date <span style="color:var(--error)">*</span></label>
        <input type="date" class="form-input" id="batch-start"/>
      </div>
      <div class="form-group">
        <label class="form-label">End Date <span style="color:var(--error)">*</span></label>
        <input type="date" class="form-input" id="batch-end"/>
      </div>
      <div class="form-group">
        <label class="form-label">Class Time <span style="color:var(--error)">*</span></label>
        <input type="time" class="form-input" id="batch-time"/>
      </div>
      <div class="form-group">
        <label class="form-label">Max Students</label>
        <input type="number" class="form-input" id="batch-max" placeholder="30" min="1"/>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Class Days <span style="color:var(--error)">*</span></label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          ${['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d => `
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="checkbox" value="${d}" name="class-day" style="accent-color:var(--primary)"/> ${d}
            </label>
          `).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="batch-status">
          <option value="UPCOMING">Upcoming</option>
          <option value="ONGOING">Ongoing</option>
          <option value="COMPLETED">Completed</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveBatch()">
        <span id="save-text">Create Batch</span>
      </button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/admin/batches.js"></script>
</body>
</html>
