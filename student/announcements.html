<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Announcements</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar" style="background:var(--student)">S</div>
        <span id="nav-name">Student</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Announcements</div>
          <div class="page-subtitle">Messages from your institute and instructors</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Announcements</span>
          <span class="badge badge-primary" id="ann-count">0</span>
        </div>
        <div class="panel-body" id="announcements-list">
          <div class="skeleton-row"><div class="skeleton"></div></div>
          <div class="skeleton-row"><div class="skeleton"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/student/announcements.js"></script>
</body>
</html>
