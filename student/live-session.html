<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sessions — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">

  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </div>
      <span class="navbar-title">Live Sessions</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar"
             style="background:var(--student)">S</div>
        <span id="nav-name">Student</span>
      </div>
    </div>
  </header>

  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"
       onclick="toggleSidebar()"></div>

  <main class="app-main">
    <div class="main-content">

      <div class="page-header">
        <div>
          <div class="page-title">Live Sessions</div>
          <div class="page-subtitle">
            Join your scheduled Zoom live classes
          </div>
        </div>
      </div>

      <!-- Upcoming Sessions -->
      <div class="panel" style="margin-bottom:24px">
        <div class="panel-head">
          <span class="panel-title">📅 Upcoming Sessions</span>
          <span class="badge badge-primary"
                id="upcoming-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Topic</th>
                <th>Batch / Course</th>
                <th>Instructor</th>
                <th>Date & Time</th>
                <th>Duration</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="upcoming-table">
              <tr>
                <td colspan="6"
                    style="text-align:center;padding:24px;
                           color:var(--text-muted)">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Past Sessions -->
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">🕐 Past Sessions</span>
          <span class="badge badge-secondary"
                id="past-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Topic</th>
                <th>Batch / Course</th>
                <th>Instructor</th>
                <th>Date & Time</th>
                <th>Duration</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="past-table">
              <tr>
                <td colspan="6"
                    style="text-align:center;padding:24px;
                           color:var(--text-muted)">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/student/live-session.js"></script>
</body>
</html>
