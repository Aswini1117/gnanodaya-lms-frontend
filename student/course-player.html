<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Player — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
  <style>
    .player-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      align-items: flex-start;
    }
    .video-box {
      background: #000;
      border-radius: var(--radius-lg);
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 48px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .video-box iframe,
    .video-box video {
      width: 100%;
      height: 100%;
      border: none;
    }
    .lesson-list-panel { position: sticky; top: 80px; }
    .lesson-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      transition: var(--transition);
      margin-bottom: 4px;
    }
    .lesson-item:hover { background: var(--bg); }
    .lesson-item.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .lesson-item.done { color: var(--success); }
    .lesson-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .lesson-item.active .lesson-num { background: var(--primary); color: #fff; }
    .lesson-item.done  .lesson-num { background: var(--success);  color: #fff; }
    @media (max-width: 900px) {
      .player-layout { grid-template-columns: 1fr; }
      .lesson-list-panel { position: static; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title" id="course-title">Course Player</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar" style="background:var(--student)">S</div>
        <span id="nav-name">Student</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">

      <div style="margin-bottom:16px">
        <a href="/student/my-courses.html" class="btn">← Back to My Courses</a>
      </div>

      <div class="player-layout">

        <!-- Video + Lesson Info -->
        <div>
          <div class="video-box" id="video-container">
            <span>▶</span>
          </div>

          <div class="panel">
            <div class="panel-body">
              <div style="font-size:18px;font-weight:700;margin-bottom:8px" id="lesson-title">Select a lesson</div>
              <div style="font-size:14px;color:var(--text-secondary);line-height:1.7" id="lesson-desc">
                Choose a lesson from the right panel to start learning.
              </div>
              <div style="margin-top:16px;display:flex;gap:10px">
                <button class="btn" id="prev-btn" onclick="prevLesson()" disabled>← Previous</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextLesson()" disabled>Next →</button>
                <button class="btn btn-success" id="complete-btn" onclick="markComplete()" style="margin-left:auto" disabled>
                  ✓ Mark Complete
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Lesson List -->
        <div class="lesson-list-panel">
          <div class="panel">
            <div class="panel-head">
              <span class="panel-title">Course Content</span>
              <span id="progress-text" style="font-size:12px;color:var(--text-muted)">0%</span>
            </div>
            <div style="padding:8px">
              <div class="progress-bar" style="margin-bottom:12px">
                <div class="progress-fill" id="course-progress" style="width:0%"></div>
              </div>
              <div id="lesson-list"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/student/course-player.js"></script>
</body>
</html>
