<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course Builder — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Course Builder</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar" style="background:var(--instructor)">I</div>
        <span id="nav-name">Instructor</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title" id="page-title">Create Course</div>
          <div class="page-subtitle">Fill in the details below</div>
        </div>
        <div class="page-actions">
          <a href="/instructor/my-courses.html" class="btn">← Back</a>
          <button class="btn btn-primary" onclick="saveCourse()">💾 Save Course</button>
        </div>
      </div>

      <div class="content-grid">
        <!-- Course Details -->
        <div class="panel" style="grid-column:span 2">
          <div class="panel-head"><span class="panel-title">Course Details</span></div>
          <div class="panel-body">
            <input type="hidden" id="course-id"/>
            <div class="form-group">
              <label class="form-label">Course Title <span style="color:var(--error)">*</span></label>
              <input type="text" class="form-input" id="course-title" placeholder="Enter course title"/>
            </div>
            <div class="form-group">
              <label class="form-label">Description</label>
              <textarea class="form-textarea" id="course-desc" placeholder="Enter course description" style="min-height:120px"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Category</label>
                <input type="text" class="form-input" id="course-category" placeholder="e.g. Programming"/>
              </div>
              <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-select" id="course-status">
                  <option value="DRAFT">Draft</option>
                  <option value="PUBLISHED">Published</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Modules -->
        <div class="panel" style="grid-column:span 2">
          <div class="panel-head">
            <span class="panel-title">Modules</span>
            <button class="btn btn-sm btn-primary" onclick="addModule()">+ Add Module</button>
          </div>
          <div class="panel-body" id="modules-list">
            <div class="empty-state">
              <div class="empty-icon">📦</div>
              <p>No modules yet. Click + Add Module to start.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/instructor/course-builder.js"></script>
</body>
</html>
