<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quizzes — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">
  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
      <span class="navbar-title">Quizzes</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar" style="background:var(--instructor)">I</div>
        <span id="nav-name">Instructor</span>
      </div>
    </div>
  </header>
  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <main class="app-main">
    <div class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Quizzes</div>
          <div class="page-subtitle">Create and manage quizzes</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openAddModal()">+ Create Quiz</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Quizzes</span>
          <span class="badge badge-primary" id="quiz-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Quiz Title</th>
                <th>Course</th>
                <th>Questions</th>
                <th>Time Limit</th>
                <th>Attempts</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="quizzes-table">
              <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="quiz-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Create Quiz</div>
    <input type="hidden" id="quiz-id"/>
    <div class="form-group">
      <label class="form-label">Quiz Title <span style="color:var(--error)">*</span></label>
      <input type="text" class="form-input" id="quiz-title" placeholder="Quiz title"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Course ID <span style="color:var(--error)">*</span></label>
        <input type="text" class="form-input" id="quiz-course" placeholder="Course ID"/>
      </div>
      <div class="form-group">
        <label class="form-label">Time Limit (mins)</label>
        <input type="number" class="form-input" id="quiz-time" placeholder="e.g. 30"/>
      </div>
      <div class="form-group">
        <label class="form-label">Max Attempts</label>
        <input type="number" class="form-input" id="quiz-attempts" placeholder="e.g. 3"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveQuiz()">Save Quiz</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/instructor/quizzes.js"></script>
</body>
</html>
