<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sessions — LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/globals.css"/>
  <link rel="stylesheet" href="../css/shared.css"/>
</head>
<body>
<div class="app-layout">

  <header class="app-navbar">
    <div class="navbar-left">
      <div class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </div>
      <span class="navbar-title">Live Sessions</span>
    </div>
    <div class="navbar-right">
      <div class="navbar-icon-btn">🔔<div class="notif-dot"></div></div>
      <div class="navbar-user">
        <div class="navbar-avatar" id="nav-avatar"
             style="background:var(--instructor)">I</div>
        <span id="nav-name">Instructor</span>
      </div>
    </div>
  </header>

  <aside class="app-sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"
       onclick="toggleSidebar()"></div>

  <main class="app-main">
    <div class="main-content">

      <div class="page-header">
        <div>
          <div class="page-title">Live Sessions</div>
          <div class="page-subtitle">
            Schedule and manage Zoom live classes
          </div>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" onclick="openAddModal()">
            + Schedule Session
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">All Sessions</span>
          <span class="badge badge-primary" id="session-count">0</span>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Topic</th>
                <th>Batch / Course</th>
                <th>Date & Time</th>
                <th>Duration</th>
                <th>Join Link</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="sessions-table">
              <tr>
                <td colspan="7"
                    style="text-align:center;padding:24px;
                           color:var(--text-muted)">
                  Loading...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Schedule Session Modal -->
<div class="modal-overlay" id="session-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Schedule Zoom Session</div>
    <input type="hidden" id="session-id"/>

    <div class="form-group">
      <label class="form-label">
        Topic <span style="color:var(--error)">*</span>
      </label>
      <input type="text" class="form-input" id="session-title"
             placeholder="e.g. VLSI Basics Class"/>
    </div>

    <div class="form-group">
      <label class="form-label">Agenda</label>
      <textarea class="form-textarea" id="session-agenda"
                placeholder="What will be covered in this session?"
                rows="2"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">
        Batch <span style="color:var(--error)">*</span>
      </label>
      <select class="form-input" id="session-batch">
        <option value="">Select Batch</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">
          Date <span style="color:var(--error)">*</span>
        </label>
        <input type="date" class="form-input" id="session-date"/>
      </div>
      <div class="form-group">
        <label class="form-label">
          Time <span style="color:var(--error)">*</span>
        </label>
        <input type="time" class="form-input" id="session-time"/>
      </div>
      <div class="form-group">
        <label class="form-label">
          Duration (minutes) <span style="color:var(--error)">*</span>
        </label>
        <input type="number" class="form-input" id="session-duration"
               value="60" min="15" max="480"/>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSession()">
        Schedule Session
      </button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/role-guard.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/instructor/live-sessions.js"></script>
</body>
</html>
